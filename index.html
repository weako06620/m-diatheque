<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2D6A4F">
  <meta name="description" content="Médiathèque de Cipières — Catalogue et gestion des emprunts">
  <title>Médiathèque · Cipières</title>

  <!-- ── Polices Google ─────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <!-- ── Feuilles de style (ordre obligatoire) ──────────────────────── -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div id="app">

    <!-- ── En-tête ──────────────────────────────────────────────────── -->
    <header id="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="header-logo" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <rect width="28" height="28" rx="8" fill="#2D6A4F"/>
              <path d="M7 8h8a4 4 0 0 1 0 8H7V8z" fill="white" opacity="0.9"/>
              <path d="M7 16h9a3 3 0 0 1 0 6H7v-6z" fill="white" opacity="0.6"/>
            </svg>
          </div>
          <div>
            <h1 class="header-title">Médiathèque</h1>
            <span class="header-subtitle">Cipières</span>
          </div>
        </div>
        <button id="btn-admin" class="btn-icon" aria-label="Espace administrateur" title="Administration">
          <!-- Icône injectée par app.js -->
        </button>
      </div>
    </header>

    <!-- ── Zone de contenu principale (vues injectées ici) ──────────── -->
    <main id="app-main" role="main" aria-live="polite"></main>

    <!-- ── Navigation basse ─────────────────────────────────────────── -->
    <nav id="app-nav" aria-label="Navigation principale">
      <button class="nav-item active" data-view="catalogue" aria-label="Catalogue">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>Catalogue</span>
      </button>
      <button class="nav-item" data-view="emprunts" aria-label="Emprunts">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Emprunts</span>
      </button>
      <button class="nav-item" data-view="stats" aria-label="Statistiques">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Statistiques</span>
      </button>
    </nav>

    <!-- ── Overlay & conteneur modal ────────────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Fenêtre modale">
      <!-- Contenu injecté dynamiquement par ui.js -->
    </div>

  </div><!-- /#app -->

  <!-- ── Scripts (ordre obligatoire : data → router → ui → app) ──── -->
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
